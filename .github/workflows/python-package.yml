# Install dependencies, lint, unit tests, CLI smoke, and fast E2E.

name: Python package

on:
  push:
    branches: [ "main", "maintenance/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest click rich
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e ".[cli]" || true
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Unit tests (pytest)
      run: |
        pytest tests/ -v --ignore=tests/e2e_tests.py
    - name: CLI smoke
      run: |
        python cli.py --help
        python cli.py config create --output /tmp/ml-test.yaml --template basic
        python cli.py config validate --path /tmp/ml-test.yaml
        python cli.py doctor || true
    - name: Fast E2E (serial)
      env:
        MUTALAMBDA_E2E_SERIAL: "1"
      run: |
        python tests/e2e_tests.py --fast --serial || python tests/e2e_tests.py --fast
