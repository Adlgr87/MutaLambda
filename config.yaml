# MutaLambda Configuration v3.0
# Fitness-Directed Gradient Migration + Multi-Objective Evolution

evolution:
  generations: 30
  early_stop: 15

population:
  size: 30
  init_size: 60
  top_k: 15

fitness:
  # Multi-objective weights (6D FitnessVector)
  correctness: 2.5
  latency: 1.2
  memory: 0.5
  parsimony: 0.8
  # Fitness components (internal normalization)
  accuracy: 2.0
  throughput: 1.0
  # Benchmark configuration
  benchmark_timeout: 10.0
  benchmark_warmup_runs: 1
  benchmark_timed_runs: 3
  benchmark_max_input_size: 1000
  # NSGA-II Pareto selection (Phase 1)
  nsga2_selection: true
  # Tournament selection parameters
  tournament_size: 3
  # Adaptive selection pressure
  adaptive_pressure: true
  pressure_min: 0.8
  pressure_max: 1.5

sandbox:
  timeout: 60
  max_output: 10000
  docker_image: python:3.11-slim

island:
  count: 4
  migrants_per_island: 3
  migration_interval: 5

migration:
  # NEW: fitness_gradient topology for quality-aware migration
  topology: fitness_gradient
  # Gradient migration parameters
  gradient_alpha: 0.7          # Weight for fitness gradient
  gradient_beta: 0.3           # Weight for diversity gap
  top_k_targets: 2             # Max destination islands per migration
  stagnation_threshold: 0.05   # Min improvement ratio before "stagnant"
  elite_injection: true        # Inject top 5% as directed seeds
  min_diversity_gap: 0.15      # Minimum code diversity to allow migration
  max_diversity_gap: 0.85      # Maximum diversity (avoid incompatible code)
  fitness_window: 5            # Generations for fitness trend averaging

llm:
  provider: ollama             # openai | anthropic | ollama | local | mock
  model: qwen2.5-coder:7b
  base_url: http://localhost:11434
  api_key: ""
  temperature: 0.8
  max_tokens: 4096
  # Fallback config
  fallback_model: deepseek-v4-flash
  fallback_provider: deepseek
  fallback_base_url: http://127.0.0.1:8787/v1

# Lineage graph: full genealogy DAG
lineage:
  enabled: true
  export_format: json          # json | dot | both
  compress_ratio: 0.1          # keep top 10% nodes in compressed archive

# Advanced selection strategies (Phase 1)
selection:
  strategy: ucb                 # ucb | thompson | epsilon_greedy | pareto | hybrid
  epsilon: 0.15                 # for epsilon_greedy
  c_explore: 1.41               # UCB exploration constant (sqrt(2))
  window_size: 20               # sliding window for reward estimation

# Meta-evolution: self-tuning hyperparameters
meta_evolution:
  enabled: true
  tune_interval: 10             # re-tune every N generations
  population_size: 8            # EvoParams population
  mutation_rate: 0.3            # EvoParams mutation rate
  elitism: 2                    # top N EvoParams survive unchanged

# HFC (Hierarchical Fair Competition) tier management
hfc:
  enabled: true
  tiers:
    laboratory: 0.0             # everything starts here
    proven: 0.7                 # promote at 70% of best score
    archive: 0.9                # archive at 90% of best score
  demote_threshold: 0.3         # demote if score drops below 30% of best
  max_archive_size: 50

# Convergent evolution: directed pressure toward target
convergent:
  enabled: false
  target: null                  # target code or description
  target_weight: 2.0            # weight for target similarity bonus
  decay: 0.98                   # per-generation decay of convergent pressure

# Advanced features
advanced:
  pattern_memory: true          # learn AST mutation patterns from success
  tipping_points: true          # detect phase transitions in evolution
  thc_enabled: true             # Transferencia Horizontal de Código
  thc_min_fitness: 0.5          # min normalized fitness for THC donor
  thc_max_size: 0.4             # max 40% of recipient code
  thc_compatibility: 0.3        # min structural similarity
  mascot: true                  # auto-generate visual mascot from code DNA
